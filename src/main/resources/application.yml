server:
  port: 8082

spring:
  application:
    name: medisync-core 
  datasource:
    url: jdbc:postgresql://postgres-core:5432/medisync_core
    username: postgres
    password: rootpassword
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop 
    show-sql: true 
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: redis-core 
      port: 6379
  cache:
    type: redis

application:
  security:
    jwt:
      secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics